AWSTemplateFormatVersion: '2010-09-09'
Description: Parameterized S3 + SNS with safe naming conventions

Parameters:
  Prefix:
    Type: String
    Default: myapp

  Environment:
    Type: String
    AllowedValues:
      - dev
      - test
      - prod
    Default: dev

Resources:

  # ---------------------------
  # S3 Bucket (Safe Naming)
  # ---------------------------
  AppBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Prefix}-${Environment}-app-bucket-${AWS::AccountId}-${AWS::StackName}"

  # ---------------------------
  # SNS Topic (Parameterized)
  # ---------------------------
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${Prefix}-${Environment}-alerts-topic-${AWS::AccountId}"

Outputs:
  BucketName:
    Value: !Ref AppBucket
    Description: Created S3 bucket name

  TopicArn:
    Value: !Ref AlertsTopic
    Description: SNS Topic ARN