AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Secrets Manager demo

Resources:

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: myapp/dev/db-secret
      Description: Auto-generated secret (no hardcoded password)
      GenerateSecretString:
        SecretStringTemplate: '{"username":"admin_user"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'