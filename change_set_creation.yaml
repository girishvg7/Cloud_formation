AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for EC2 to access S3 (Read Only)

Parameters:
  Prefix:
    Type: String
    Default: myapp

Resources:

  # -------------------------
  # IAM Role
  # -------------------------
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Prefix}-ec2-s3-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        - PolicyName: S3ReadOnlyPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                Resource: "*"

  # -------------------------
  # Instance Profile
  # -------------------------
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${Prefix}-ec2-profile"
      Roles:
        - !Ref EC2Role

Outputs:
  RoleName:
    Value: !Ref EC2Role

  InstanceProfileName:
    Value: !Ref EC2InstanceProfile